name: Publish to Maven Central
on:
  push:
    tags: ['v*']
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: temurin
          cache: maven
          server-id: central
          server-username: NEXUS_USERNAME
          server-password: NEXUS_PASSWORD
          gpg-private-key: ${{ secrets.GPG_SIGNING_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE
      - name: Verify GPG key
        run: |
          echo "GPG secret keys:"
          gpg --list-secret-keys --keyid-format=long
          if ! gpg --list-secret-keys 2>/dev/null | grep -q sec; then
            echo "::error::No GPG secret keys found. Check that GPG_SIGNING_KEY secret is set and contains a valid ASCII-armored private key."
            exit 1
          fi
          if gpg --list-secret-keys 2>/dev/null | grep -q expired; then
            echo "::error::GPG key is expired. Generate a new key or extend the expiry and update the GPG_SIGNING_KEY org secret."
            exit 1
          fi
      - name: Generate CHANGELOG
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          PREV_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]' | sed -n '2p')
          {
            echo "## [$VERSION] - $(date -u +%Y-%m-%d)"
            echo ""
            if [ -n "$PREV_TAG" ]; then
              RANGE="$PREV_TAG..HEAD"
            else
              RANGE="HEAD"
            fi
            git log $RANGE --pretty=format:"%s" | grep -E '^(feat|fix|perf|refactor|docs|chore|build|ci|test|revert)(\(.+\))?!?:' | \
            awk '
              /^feat/ { section="### Features"; feats = feats "\n- " $0; next }
              /^fix/  { section="### Bug Fixes"; fixes = fixes "\n- " $0; next }
              /^perf/ { perfs = perfs "\n- " $0; next }
              /^revert/ { reverts = reverts "\n- " $0; next }
              { others = others "\n- " $0 }
              END {
                if (feats)   { print "### Features";   print feats;   print "" }
                if (fixes)   { print "### Bug Fixes";  print fixes;   print "" }
                if (perfs)   { print "### Performance"; print perfs;  print "" }
                if (reverts) { print "### Reverts";    print reverts; print "" }
                if (others)  { print "### Other";      print others;  print "" }
              }
            '
            echo ""
          } > /tmp/new_section.md
          if [ -f CHANGELOG.md ] && grep -q "^## \[" CHANGELOG.md; then
            # Prepend new section after the header lines
            head -n $(grep -n "^## \[" CHANGELOG.md | head -1 | cut -d: -f1 | awk '{print $1-1}') CHANGELOG.md > /tmp/changelog_header.md
            tail -n +$(grep -n "^## \[" CHANGELOG.md | head -1 | cut -d: -f1) CHANGELOG.md > /tmp/changelog_rest.md
            cat /tmp/changelog_header.md /tmp/new_section.md /tmp/changelog_rest.md > CHANGELOG.md
          else
            {
              echo "# Changelog"
              echo ""
              echo "All notable changes to this project will be documented in this file."
              echo ""
              cat /tmp/new_section.md
            } > CHANGELOG.md
          fi
      - name: Update GitHub Release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${GITHUB_REF_NAME}" --notes-file /tmp/new_section.md
      - name: Set release version
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mvn versions:set -DnewVersion=$VERSION -DgenerateBackupPoms=false
          mvn -f entitlements-client-bom/pom.xml versions:set -DnewVersion=$VERSION -DgenerateBackupPoms=false
          mvn -f entitlements-client-spring-boot-starter/pom.xml versions:set -DnewVersion=$VERSION -DgenerateBackupPoms=false
          mvn -f entitlements-client-spring-boot-starter/pom.xml versions:set-property -Dproperty=entitlements-client.version -DnewVersion=$VERSION -DgenerateBackupPoms=false
          mvn -f entitlements-client-test/pom.xml versions:set -DnewVersion=$VERSION -DgenerateBackupPoms=false
          mvn -f entitlements-client-test/pom.xml versions:set-property -Dproperty=entitlements-client.version -DnewVersion=$VERSION -DgenerateBackupPoms=false
      - name: Publish SDK
        run: mvn deploy --batch-mode -P release -DskipTests
        env:
          NEXUS_USERNAME: ${{ secrets.NEXUS_USERNAME }}
          NEXUS_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
      - name: Publish BOM
        run: mvn -f entitlements-client-bom/pom.xml deploy --batch-mode -P release
        env:
          NEXUS_USERNAME: ${{ secrets.NEXUS_USERNAME }}
          NEXUS_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
      - name: Publish Spring Boot Starter
        run: mvn -f entitlements-client-spring-boot-starter/pom.xml deploy --batch-mode -P release -DskipTests
        env:
          NEXUS_USERNAME: ${{ secrets.NEXUS_USERNAME }}
          NEXUS_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
      - name: Publish Test Utilities
        run: mvn -f entitlements-client-test/pom.xml deploy --batch-mode -P release -DskipTests
        env:
          NEXUS_USERNAME: ${{ secrets.NEXUS_USERNAME }}
          NEXUS_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
